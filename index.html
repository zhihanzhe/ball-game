<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 球体 - Three.js</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas {
            display: block;
            touch-action: none;
        }
        .lv-card {
            width: 172px; height: 200px;
            background: rgba(20,20,40,0.92);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            cursor: pointer;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: transform 0.2s, border-color 0.25s, box-shadow 0.25s;
            margin: 0 10px;
            position: relative;
            overflow: hidden;
        }
        .lv-card:hover {
            transform: translateY(-6px) scale(1.04);
        }
        .lv-card .lv-num {
            font-family: 'Arial Black', Arial, sans-serif;
            font-size: 48px; font-weight: 900;
            margin: 0 0 2px 0;
            line-height: 1;
        }
        .lv-card .lv-name {
            font-family: 'Arial Black', Arial, sans-serif;
            font-size: 18px; font-weight: 700;
            margin: 0 0 10px 0;
            color: rgba(255,255,255,0.8);
        }
        .lv-card .lv-info {
            font-family: Arial, sans-serif;
            font-size: 11px;
            color: rgba(255,255,255,0.45);
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <!-- 关卡选择 -->
    <div id="levelselect-overlay" style="display:flex; position:fixed; top:0; left:0; width:100%; height:100%; background:radial-gradient(ellipse at center, #0f0f2a 0%, #050510 100%); z-index:20; flex-direction:column; justify-content:center; align-items:center;">
        <h1 style="font-family:'Arial Black',Arial,sans-serif; font-size:42px; font-weight:900; color:#fff; margin:0 0 8px 0; text-shadow:0 0 18px #8b5cf6, 0 0 40px #4a30a0; letter-spacing:4px;">选择关卡</h1>
        <p style="font-family:Arial,sans-serif; font-size:14px; color:rgba(255,255,255,0.4); margin:0 0 36px 0;">SELECT STAGE</p>
        <div id="lv-cards-row" style="display:flex; flex-wrap:wrap; justify-content:center; align-items:center; gap:6px;">
            <div class="lv-card" data-level="0" style="border-color:#ff8cfd; box-shadow:0 0 18px #ff8cfd44, inset 0 0 18px #ff8cfd11; cursor:pointer;">
                <div class="lv-num" style="color:#ff8cfd; text-shadow:0 0 16px #ff8cfd;">1</div>
                <div class="lv-name">启程</div>
                <div class="lv-info">仅长直轨道<br>跳跃 1 次刷出黑洞</div>
            </div>
            <div class="lv-card lv-locked" data-level="1" style="border-color:rgba(255,255,255,0.08); cursor:default;">
                <div class="lv-num" style="color:rgba(255,255,255,0.18); text-shadow:none;">2</div>
                <div class="lv-name" style="color:rgba(255,255,255,0.25);">虫洞</div>
                <div class="lv-info" style="color:rgba(255,255,255,0.15);">长直+两方块<br>跳跃 10 次刷出黑洞</div>
                <div class="lv-lock" style="position:absolute; top:0; left:0; width:100%; height:100%; border-radius:14px; background:rgba(0,0,0,0.55); display:flex; align-items:center; justify-content:center; font-size:36px; pointer-events:none;">🔒</div>
            </div>
            <div class="lv-card lv-locked" data-level="2" style="border-color:rgba(255,255,255,0.08); cursor:default;">
                <div class="lv-num" style="color:rgba(255,255,255,0.18); text-shadow:none;">3</div>
                <div class="lv-name" style="color:rgba(255,255,255,0.25);">视界</div>
                <div class="lv-info" style="color:rgba(255,255,255,0.15);">全部轨道类型<br>跳跃 20 次刷出黑洞</div>
                <div class="lv-lock" style="position:absolute; top:0; left:0; width:100%; height:100%; border-radius:14px; background:rgba(0,0,0,0.55); display:flex; align-items:center; justify-content:center; font-size:36px; pointer-events:none;">🔒</div>
            </div>
            <div class="lv-card lv-locked" data-level="3" style="border-color:rgba(255,255,255,0.08); cursor:default;">
                <div class="lv-num" style="color:rgba(255,255,255,0.18); text-shadow:none;">4</div>
                <div class="lv-name" style="color:rgba(255,255,255,0.25);">卡冈图雅</div>
                <div class="lv-info" style="color:rgba(255,255,255,0.15);">全部轨道类型<br>跳跃 200 次刷出黑洞</div>
                <div class="lv-lock" style="position:absolute; top:0; left:0; width:100%; height:100%; border-radius:14px; background:rgba(0,0,0,0.55); display:flex; align-items:center; justify-content:center; font-size:36px; pointer-events:none;">🔒</div>
            </div>
            <div class="lv-card lv-locked" data-level="4" style="border-color:rgba(255,255,255,0.08); cursor:default;">
                <div class="lv-num" style="color:rgba(255,255,255,0.18); text-shadow:none;">5</div>
                <div class="lv-name" style="color:rgba(255,255,255,0.25);">奇点</div>
                <div class="lv-info" style="color:rgba(255,255,255,0.15);">全部轨道类型<br>跳跃 2000 次刷出黑洞</div>
                <div class="lv-lock" style="position:absolute; top:0; left:0; width:100%; height:100%; border-radius:14px; background:rgba(0,0,0,0.55); display:flex; align-items:center; justify-content:center; font-size:36px; pointer-events:none;">🔒</div>
            </div>
        </div>
    </div>
    <div id="gameover-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:10; flex-direction:column; justify-content:center; align-items:center;">
        <h1 style="color:#ff4444; font-family:Arial,sans-serif; font-size:52px; margin:0 0 30px 0; text-shadow:0 0 20px #ff0000;">GAME OVER</h1>
        <button id="restart-btn" style="padding:14px 48px; font-size:22px; background:#ff4444; color:#fff; border:none; border-radius:8px; cursor:pointer; letter-spacing:2px;">重新开始</button>
        <div style="display:flex; gap:14px; margin-top:14px;">
            <button id="resume-btn" style="padding:10px 32px; font-size:15px; background:#ffaa00; color:#000; border:none; border-radius:6px; cursor:pointer; letter-spacing:1px; font-weight:bold;">继续</button>
            <button id="go-select-btn" style="padding:10px 32px; font-size:15px; background:transparent; color:rgba(255,255,255,0.5); border:1px solid rgba(255,255,255,0.2); border-radius:6px; cursor:pointer; letter-spacing:1px;">返回</button>
        </div>
    </div>
    <!-- 广告弹窗 -->
    <div id="ad-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:25; flex-direction:column; justify-content:center; align-items:center;">
        <video id="ad-video" src="future_ST.mp4" style="width:100%; height:100%; object-fit:contain;" playsinline></video>
        <div id="ad-countdown" style="position:fixed; top:28px; right:28px; font-family:'Arial Black',Arial,sans-serif; font-size:42px; font-weight:900; color:#fff; text-shadow:0 0 14px #ffaa00, 0 0 32px #ff6600; z-index:26;">5</div>
    </div>
    <!-- 胜利弹窗 -->
    <div id="win-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:15; flex-direction:column; justify-content:center; align-items:center;">
        <h1 id="win-title" style="color:#ffdd44; font-family:Arial,sans-serif; font-size:54px; margin:0 0 12px 0; text-shadow:0 0 25px #ffdd44, 0 0 50px #ff8800;">YOU WIN!</h1>
        <p id="win-msg" style="color:#ccc; font-family:Arial,sans-serif; font-size:18px; margin:0 0 30px 0;">你跃入了黑洞！</p>
        <button id="win-restart-btn" style="padding:14px 48px; font-size:22px; background:#ffaa00; color:#000; border:none; border-radius:8px; cursor:pointer; letter-spacing:2px; font-weight:bold;">下一关</button>
        <button id="win-select-btn" style="margin-top:14px; padding:10px 32px; font-size:15px; background:transparent; color:rgba(255,255,255,0.5); border:1px solid rgba(255,255,255,0.2); border-radius:6px; cursor:pointer; letter-spacing:1px;">返回选关</button>
    </div>
    <!-- 黑洞暗角 -->
    <div id="bh-vignette" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:4; pointer-events:none; opacity:0; transition:opacity 0.4s; background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 70%, rgba(0,0,0,0.85) 100%);"></div>
    <!-- 距离显示 -->
    <div id="distance-display" style="position:fixed; top:22px; right:28px; text-align:right; z-index:5; pointer-events:none; font-family:'Arial Black',Arial,sans-serif;">
        <div id="cur-dist" style="font-size:46px; font-weight:900; color:#fff; text-shadow:0 0 14px #00d4ff, 0 0 32px #0068cc, 0 0 55px #003088;">0.0 m</div>
        <div id="tar-dist" style="font-size:17px; font-weight:700; color:rgba(255,255,255,0.55); text-shadow:0 0 7px #00d4ff, 0 0 18px #0068cc; margin-top:-4px;">目标&nbsp;???&nbsp;m</div>
    </div>
    <!-- 连击鼓励 -->
    <div id="combo-display" style="position:fixed; top:10%; left:50%; transform:translate(-50%,0); text-align:center; z-index:5; pointer-events:none;">
        <div id="combo-text" style="font-family:'Arial Black',Arial,sans-serif; font-size:50px; font-weight:900; color:#fff; opacity:0; letter-spacing:4px; transition:opacity 0.18s;"></div>
        <div id="combo-count" style="font-family:'Arial Black',Arial,sans-serif; font-size:28px; font-weight:700; color:#fff; opacity:0; margin-top:-4px; transition:opacity 0.18s;"></div>
    </div>
    <!-- 加速指示 -->
    <div id="boost-indicator" style="position:fixed; top:18%; left:50%; transform:translate(-50%,0); text-align:center; z-index:5; pointer-events:none; opacity:0; transition:opacity 0.2s;">
        <div style="font-family:'Arial Black',Arial,sans-serif; font-size:20px; font-weight:900; color:#fff; text-shadow:0 0 10px #ffffff, 0 0 24px #aaaaff, 0 0 40px #6666ff;">BOOST!</div>
        <div id="boost-timer" style="font-family:'Arial Black',Arial,sans-serif; font-size:14px; font-weight:700; color:rgba(255,255,255,0.7); text-shadow:0 0 8px #aaaaff; margin-top:0px;"></div>
    </div>
    <!-- 关卡名 -->
    <div id="level-display" style="position:fixed; top:22px; left:28px; z-index:5; pointer-events:none; font-family:'Arial Black',Arial,sans-serif;">
        <div id="level-name" style="font-size:22px; font-weight:900; color:#fff; text-shadow:0 0 10px #ff8cfd, 0 0 22px #8b5cf6; transition:opacity 0.4s;"></div>
        <div id="level-sub" style="font-size:12px; font-weight:700; color:rgba(255,255,255,0.5); text-shadow:0 0 6px #8b5cf6; margin-top:-1px; transition:opacity 0.4s;"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        // === 关卡系统 ===
        const levels = [
            { name: '启程',     types: [1],         comboToWin: 1,    velZ: 1.2 },
            { name: '虫洞',     types: [1, 3, 4],   comboToWin: 10,   velZ: 1.2 },
            { name: '视界',     types: [1, 2, 3, 4], comboToWin: 20,  velZ: 1.3 },
            { name: '卡冈图雅', types: [1, 2, 3, 4], comboToWin: 200, velZ: 1.5 },
            { name: '奇点',     types: [1, 2, 3, 4], comboToWin: 2000, velZ: 1.8 },
        ];
        const totalLevels = levels.length;
        let currentLevel = 0;
        let maxUnlockedLevel = 0;   // 已解锁的最高关卡索引（初始仅第1关）

        // === 关卡选择卡片（绑定静态HTML元素） ===
        const cardGlowColors = ['#ff8cfd', '#5cd4ff', '#fff040', '#8b5cf6', '#ff8800'];
        const lvCards = [];
        (function initCards() {
            const els = document.querySelectorAll('#lv-cards-row .lv-card');
            els.forEach((card, i) => {
                const glow = cardGlowColors[i];
                const lockEl = card.querySelector('.lv-lock');
                const numEl  = card.querySelector('.lv-num');
                const nameEl = card.querySelector('.lv-name');
                const infoEl = card.querySelector('.lv-info');
                card.addEventListener('mouseenter', () => {
                    if (i > maxUnlockedLevel) return;
                    card.style.borderColor = '#fff';
                    card.style.boxShadow = '0 0 30px ' + glow + 'aa, 0 0 60px ' + glow + '44, inset 0 0 20px ' + glow + '22';
                });
                card.addEventListener('mouseleave', () => { refreshCardLock(i); });
                card.addEventListener('click', () => { if (i <= maxUnlockedLevel) startLevel(i); });
                lvCards.push({ el: card, glow, numEl, nameEl, infoEl, lockEl });
            });
        })();

        function refreshCardLock(i) {
            const c = lvCards[i];
            const locked = i > maxUnlockedLevel;
            if (c.lockEl) c.lockEl.style.display = locked ? 'flex' : 'none';
            if (locked) {
                c.el.style.borderColor = 'rgba(255,255,255,0.08)';
                c.el.style.boxShadow = 'none';
                c.el.style.cursor = 'default';
                c.numEl.style.color = 'rgba(255,255,255,0.18)';
                c.numEl.style.textShadow = 'none';
                c.nameEl.style.color = 'rgba(255,255,255,0.25)';
                c.infoEl.style.color = 'rgba(255,255,255,0.15)';
                c.el.classList.add('lv-locked');
            } else {
                c.el.style.borderColor = c.glow;
                c.el.style.boxShadow = '0 0 18px ' + c.glow + '44, inset 0 0 18px ' + c.glow + '11';
                c.el.style.cursor = 'pointer';
                c.numEl.style.color = c.glow;
                c.numEl.style.textShadow = '0 0 16px ' + c.glow;
                c.nameEl.style.color = 'rgba(255,255,255,0.8)';
                c.infoEl.style.color = 'rgba(255,255,255,0.45)';
                c.el.classList.remove('lv-locked');
            }
        }

        function unlockNextLevel() {
            if (currentLevel + 1 < totalLevels && currentLevel + 1 > maxUnlockedLevel) {
                maxUnlockedLevel = currentLevel + 1;
                refreshCardLock(maxUnlockedLevel);
            }
        }

        // 初始化卡片锁定状态
        for (let i = 0; i < totalLevels; i++) refreshCardLock(i);

        // 场景
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);

        // === 星空背景粒子 ===
        const starCount = 2000;
        const starGeo = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        const starSizes = new Float32Array(starCount);
        for (let i = 0; i < starCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = 40 + Math.random() * 60;
            starPositions[i * 3] = Math.sin(phi) * Math.cos(theta) * r;
            starPositions[i * 3 + 1] = Math.sin(phi) * Math.sin(theta) * r;
            starPositions[i * 3 + 2] = Math.cos(phi) * r;
            starSizes[i] = Math.random() * 1.8 + 0.2;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
        const starMat = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.15,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.7,
        });
        const starField = new THREE.Points(starGeo, starMat);
        scene.add(starField);

        // 相机（正对Z轴屏幕深处）
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 3, 10);
        camera.lookAt(0, 0, -10);

        // 渲染器
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // 场景雾（增强深度感）
        scene.fog = new THREE.Fog(0x1a1a2e, 10, 80);

        // 轨道控制器（禁用鼠标/滚轮交互）
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, -10);
        controls.enableDamping = false;
        controls.enableRotate = false;
        controls.enableZoom = false;
        controls.enablePan = false;
        controls.update();

        // 球体
        const geometry = new THREE.SphereGeometry(1, 64, 64);
        const material = new THREE.MeshStandardMaterial({
            color: 0x4a90d9,
            roughness: 0.15,
            metalness: 0.7,
        });

        // 简单环境贴图（Canvas渐变 → PMREM）
        {
            const envCanvas = document.createElement('canvas');
            envCanvas.width = 128; envCanvas.height = 128;
            const ctx = envCanvas.getContext('2d');
            const grad = ctx.createLinearGradient(0, 0, 0, 128);
            grad.addColorStop(0, '#1a1a4e'); grad.addColorStop(0.5, '#2a2a5e');
            grad.addColorStop(0.5, '#1a0a0a'); grad.addColorStop(1, '#0a0a0a');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, 128, 128);
            // 散布亮点模拟环境光
            for (let i = 0; i < 60; i++) {
                ctx.fillStyle = `rgba(180,200,255,${0.3 + Math.random() * 0.4})`;
                ctx.beginPath();
                ctx.arc(Math.random() * 128, Math.random() * 70, 2 + Math.random() * 6, 0, Math.PI * 2);
                ctx.fill();
            }
            const envTex = new THREE.CanvasTexture(envCanvas);
            envTex.mapping = THREE.EquirectangularReflectionMapping;
            const pmremGenerator = new THREE.PMREMGenerator(renderer);
            const envMap = pmremGenerator.fromEquirectangular(envTex).texture;
            material.envMap = envMap;
            material.envMapIntensity = 0.6;
            pmremGenerator.dispose();
            envTex.dispose();
        }
        const sphere = new THREE.Mesh(geometry, material);
        sphere.castShadow = true;
        sphere.receiveShadow = true;
        scene.add(sphere);

        // 线框球（装饰）
        const wireframeGeo = new THREE.SphereGeometry(1.02, 32, 16);
        const wireframeMat = new THREE.MeshBasicMaterial({
            color: 0x00ffff,
            wireframe: true,
            transparent: true,
            opacity: 0.15,
        });
        const wireframeSphere = new THREE.Mesh(wireframeGeo, wireframeMat);
        scene.add(wireframeSphere);

        // 粒子光环
        const particleCount = 2000;
        const ringRadius = 1.8;
        const ringThickness = 0.25;
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        const color1 = new THREE.Color(0x00ffff); // 青色
        const color2 = new THREE.Color(0x8b5cf6); // 紫色
        const color3 = new THREE.Color(0xff6b9d); // 粉色

        for (let i = 0; i < particleCount; i++) {
            const angle = (i / particleCount) * Math.PI * 2;
            const r = ringRadius + (Math.random() - 0.5) * ringThickness * 2;

            positions[i * 3] = Math.cos(angle) * r;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 0.15;
            positions[i * 3 + 2] = Math.sin(angle) * r;

            const t = i / particleCount;
            let color;
            if (t < 0.33) {
                color = color1.clone().lerp(color3, t * 3);
            } else if (t < 0.66) {
                color = color3.clone().lerp(color2, (t - 0.33) * 3);
            } else {
                color = color2.clone().lerp(color1, (t - 0.66) * 3);
            }

            colors[i * 3] = color.r;
            colors[i * 3 + 1] = color.g;
            colors[i * 3 + 2] = color.b;
        }

        const particleGeo = new THREE.BufferGeometry();
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const particleMat = new THREE.PointsMaterial({
            size: 0.04,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.85,
        });

        const particleRing = new THREE.Points(particleGeo, particleMat);
        scene.add(particleRing);

        // === 三类轨道系统（木板沿X轴排列，Z轴方向统一1.0单位长） ===
        const pink   = new THREE.Color(0xff8cfd);
        const yellow = new THREE.Color(0xfff040);
        const blue   = new THREE.Color(0x5cd4ff);
        const allColors = [pink, yellow, blue];

        const segLen    = 0.7;    // 每段轨道Z轴统一长度
        const gapAfter  = 1.0;    // 段间间距
        const defaultSegTotal = segLen + gapAfter;  // 默认每段总长 1.7（无音乐回退）
        let currentSegTotal = defaultSegTotal;
        const fullWidth = 4.0;    // 类型1 X轴全宽
        const plankThick = 0.06;
        let velZ = 1.2;            // 轨道滚动速度（关卡可变）

        // === 音频节拍分析系统 ===
        let beatTimes = [];           // 节拍时间点（秒）
        let beatAudioSlices = [];     // 每个节拍的音频切片 AudioBuffer
        let audioCtx = null;          // AudioContext
        let beatGenIdx = 0;           // 轨道生成用的节拍索引
        let audioBeatIdx = 0;         // 音频播放用的节拍索引
        let audioReady = false;

        function detectBeats(audioBuffer) {
            const data = audioBuffer.getChannelData(0);
            const sr = audioBuffer.sampleRate;
            const win = Math.floor(sr * 0.025);    // 25ms 能量窗口
            const hop = Math.floor(win / 2);
            const numWin = Math.floor((data.length - win) / hop);
            if (numWin < 10) return [];
            const energies = new Float32Array(numWin);
            for (let i = 0; i < numWin; i++) {
                let sum = 0;
                const off = i * hop;
                for (let j = 0; j < win; j++) sum += data[off + j] * data[off + j];
                energies[i] = Math.sqrt(sum / win);
            }
            // 能量差分 → 起音检测
            const onset = new Float32Array(numWin);
            for (let i = 1; i < numWin; i++) onset[i] = Math.max(0, energies[i] - energies[i - 1]);
            // 自适应阈值（局部均值 × 系数）
            const threshWin = 50;
            const results = [];
            let lastBeat = -999;
            const minGap = Math.floor(sr * 0.15 / hop); // 最小节拍间隔 150ms
            for (let i = 1; i < numWin - 1; i++) {
                let sum = 0, cnt = 0;
                const start = Math.max(0, i - threshWin);
                for (let k = start; k <= i; k++) { sum += onset[k]; cnt++; }
                const th = (sum / cnt) * 3.2;
                if (onset[i] > th && onset[i] > onset[i - 1] && onset[i] > onset[i + 1] && i - lastBeat >= minGap) {
                    results.push(i * hop / sr);
                    lastBeat = i;
                }
            }
            return results;
        }

        let audioInitStarted = false;
        async function initAudio() {
            if (audioInitStarted) return;
            audioInitStarted = true;
            try {
                ensureAudioCtx();
                // 使用 XHR 替代 fetch，兼容 file:// 协议（手机直接打开）
                const buf = await new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('GET', 'future_ST.m4a', true);
                    xhr.responseType = 'arraybuffer';
                    xhr.onload = () => {
                        if (xhr.status === 200 || xhr.status === 0) resolve(xhr.response);
                        else reject(new Error('XHR failed: ' + xhr.status));
                    };
                    xhr.onerror = () => reject(new Error('XHR error'));
                    xhr.send();
                });
                const audioBuffer = await audioCtx.decodeAudioData(buf);
                beatTimes = detectBeats(audioBuffer);
                if (beatTimes.length < 2) { console.warn('节拍检测不足，使用默认间距'); return; }
                // 切出每个重音前后约0.55s的音频片段（总长约1.1s，略小于弹跳周期）
                const sliceHalf = 0.55;
                for (let i = 0; i < beatTimes.length; i++) {
                    const t = beatTimes[i];
                    const t0 = Math.max(0, t - sliceHalf);
                    const dur = Math.min(sliceHalf * 2, audioBuffer.duration - t0);
                    const len = Math.floor(dur * audioBuffer.sampleRate);
                    const sBuf = audioCtx.createBuffer(1, len, audioBuffer.sampleRate);
                    const ch = sBuf.getChannelData(0);
                    const srcOff = Math.floor(t0 * audioBuffer.sampleRate);
                    for (let j = 0; j < len && srcOff + j < audioBuffer.length; j++) {
                        ch[j] = audioBuffer.getChannelData(0)[srcOff + j];
                    }
                    beatAudioSlices.push(sBuf);
                }
                audioReady = true;
                console.log('节拍分析完成：' + beatTimes.length + ' 个节拍');
            } catch (e) {
                console.warn('音频初始化失败：', e);
            }
        }

        function ensureAudioCtx() {
            if (!audioCtx) {
                try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return false; }
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return true;
        }

        function playBeatAudio() {
            if (!ensureAudioCtx()) return;
            const now = audioCtx.currentTime;
            // 计算当前弹跳周期（一个碰撞到下一个碰撞的时间）
            const boosting = performance.now() < speedBoostEndTime;
            const evz = boosting ? velZ * boostVelZFactor : velZ;
            const cycleTime = currentSegTotal / evz;
            const maxSlice = Math.max(0.25, cycleTime * 0.85); // 略小于弹跳周期
            // 底鼓：低频正弦波快速衰减
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(160, now);
            osc.frequency.exponentialRampToValueAtTime(35, now + 0.14);
            g.gain.setValueAtTime(0.65, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + 0.18);
            // 白噪声短促打击感
            const bufLen = Math.floor(audioCtx.sampleRate * 0.05);
            const nBuf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
            const nd = nBuf.getChannelData(0);
            for (let i = 0; i < bufLen; i++) nd[i] = (Math.random() * 2 - 1) * (1 - i / bufLen);
            const ns = audioCtx.createBufferSource();
            const ng = audioCtx.createGain();
            ns.buffer = nBuf;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'highpass'; filter.frequency.value = 2000;
            ng.gain.setValueAtTime(0.25, now);
            ng.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
            ns.connect(filter); filter.connect(ng); ng.connect(audioCtx.destination);
            ns.start(now); ns.stop(now + 0.05);
            // 播放提取的重音切片（时长由弹跳周期决定，渐弱收尾防止重叠）
            if (audioReady && beatAudioSlices.length > 0) {
                const idx = audioBeatIdx % beatAudioSlices.length;
                const src = audioCtx.createBufferSource();
                src.buffer = beatAudioSlices[idx];
                const sg = audioCtx.createGain();
                sg.gain.setValueAtTime(0.55, now);
                sg.gain.setValueAtTime(0.55, now + maxSlice - 0.08);
                sg.gain.linearRampToValueAtTime(0.001, now + maxSlice);
                src.connect(sg); sg.connect(audioCtx.destination);
                src.start(now, 0, maxSlice);
            }
            audioBeatIdx++;
        }

        // 类型2参数：三块沿X轴排列
        const t2_xGap = 0.2;

        const plankTopY = -1.9 + plankThick / 2;

        // 路径连通性保证
        let safeColor = null;            // 当前长直轨道颜色（玩家应处于的颜色）
        let segmentsGenerated = 0;       // 已生成段数
        const invincibleUntilZ = 3.4;    // 无敌时间：前两段为Type1，第三段接触前不判死

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];

        function createPlank(xWidth, x, color, type) {
            const geo = new THREE.BoxGeometry(xWidth, plankThick, segLen);
            const mat = new THREE.MeshStandardMaterial({
                color: color,

            });

        // 箭头纹理（类型2/3方块上底面，白色向前箭头）
        function createArrowTex() {
            const s = 256;
            const canvas = document.createElement('canvas');
            canvas.width = s; canvas.height = s;
            const ctx = canvas.getContext('2d');
            const cx = s / 2;
            ctx.fillStyle = '#ffffff';
            // 箭头三角（尖端朝上=-Z方向）
            const tipY = 38, baseY = 106, hw = 50, sw = 24;
            ctx.beginPath();
            ctx.moveTo(cx, tipY);
            ctx.lineTo(cx - hw, baseY);
            ctx.lineTo(cx + hw, baseY);
            ctx.closePath();
            ctx.fill();
            // 箭杆（三角下方）
            ctx.fillRect(cx - sw / 2, baseY, sw, 228 - baseY);
            return new THREE.CanvasTexture(canvas);
        }
        const arrowTex = createArrowTex();

        function addArrowOverlay(plankMesh, xWidth) {
            const geo = new THREE.PlaneGeometry(xWidth * 0.7, segLen * 0.7);
            const mat = new THREE.MeshBasicMaterial({
                map: arrowTex,
                transparent: true,
                depthWrite: false,
                side: THREE.DoubleSide,
            });
            const arrowPlane = new THREE.Mesh(geo, mat);
            arrowPlane.rotation.x = -Math.PI / 2;
            arrowPlane.position.y = plankThick / 2 + 0.003;
            plankMesh.add(arrowPlane);
        }

        // 类型1：整块木板（X轴全宽），粉/黄/蓝随机一色，球落其上
        function addType1(zStart) {
            const color = allColors[Math.floor(Math.random() * 3)];
            safeColor = color;
            segmentsGenerated++;
            const p = createPlank(fullWidth, 0, color, 1);
            p.position.z = zStart - segLen / 2;
            plankGroup.add(p);
            plankPool.push(p);
            return currentSegTotal;
        }

        // 类型2：三块沿X轴分列（中块在X=0），粉+黄+蓝各一（必然包含safeColor）
        function addType2(zStart) {
            segmentsGenerated++;
            const colors = shuffle(allColors);
            for (let i = 0; i < 3; i++) {
                const x = (i - 1) * (t2_xWidth + t2_xGap);
                const p = createPlank(t2_xWidth, x, colors[i], 2);
                p.position.z = zStart - segLen / 2;
                plankGroup.add(p);
                plankPool.push(p);
                addArrowOverlay(p, t2_xWidth);
            }
            return currentSegTotal;
        }

        // 类型3：两块沿X轴分列，必须包含safeColor以保证路径连通
        function addType3(zStart) {
            segmentsGenerated++;
            let colors;
            if (safeColor) {
                const others = allColors.filter(c => !c.equals(safeColor));
                const other = others[Math.floor(Math.random() * others.length)];
                colors = shuffle([safeColor, other]);
            } else {
                colors = shuffle(allColors).slice(0, 2);
            }
            for (let i = 0; i < 2; i++) {
                const x = (i - 0.5) * (t3_xWidth + t3_xGap);
                const p = createPlank(t3_xWidth, x, colors[i], 3);
                p.position.z = zStart - segLen / 2;
                plankGroup.add(p);
                plankPool.push(p);
                addArrowOverlay(p, t3_xWidth);
            }
            return currentSegTotal;
        }

        // 类型4：白色发光加速轨道（形状同长直轨道），碰撞后球色不变，10秒内重力3倍
        function addType4(zStart) {
            segmentsGenerated++;
            const white = new THREE.Color(0xffffff);
            const p = createPlank(fullWidth, 0, white, 4);
            p.position.z = zStart - segLen / 2;
            p.material.color.set(0xffffff);
            p.material.emissive.set(0xffffff);
            p.material.emissiveIntensity = 1.1;
            p.material.roughness = 0.15;
            plankGroup.add(p);
            plankPool.push(p);
            return currentSegTotal;
        }

        const farWorldLimit = -50;
        let nextSegZ = 0;

        function ensureSegments() {
            while (nextSegZ + plankGroup.position.z > farWorldLimit) {
                // 节拍同步间距
                const boosting = performance.now() < speedBoostEndTime;
                const evz = boosting ? velZ * boostVelZFactor : velZ;
                if (audioReady && beatTimes.length >= 2) {
                    const i0 = beatGenIdx % beatTimes.length;
                    const i1 = (beatGenIdx + 1) % beatTimes.length;
                    let dt = beatTimes[i1] - beatTimes[i0];
                    if (dt <= 0) dt += beatTimes[beatTimes.length - 1] + (beatTimes[1] - beatTimes[0]);
                    currentSegTotal = Math.max(segLen + 0.3, dt * evz);
                    beatGenIdx++;
                } else {
                    currentSegTotal = defaultSegTotal;
                }
                const allowed = levels[currentLevel].types;
                let type;
                if (segmentsGenerated < 2) {
                    type = 1;
                } else if (allowed.includes(4) && Math.random() < 0.12) {
                    type = 4;
                } else {
                    const non4 = allowed.filter(t => t !== 4);
                    type = non4[Math.floor(Math.random() * non4.length)];
                }
                if (type === 1) nextSegZ -= addType1(nextSegZ);
                else if (type === 2) nextSegZ -= addType2(nextSegZ);
                else if (type === 3) nextSegZ -= addType3(nextSegZ);
                else nextSegZ -= addType4(nextSegZ);
            }
        }

        function recyclePlanks(maxWorldZ) {

                const p = plankPool[i];
                if (p.position.z + plankGroup.position.z > maxWorldZ) {

                    plankPool.splice(i, 1);
                }
            }
        }

        // === 游戏状态 ===
