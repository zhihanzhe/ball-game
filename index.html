        // === 黑洞系统（碰撞30次后出现） ===
        let blackHoleSpawned = false;
        let blackHoleMesh = null;
        let gameWon = false;
        const blackHoleData = {
            targetZ: 0,      // 黑洞世界Z（不断更新）
            particles: [],    // 环绕粒子数据
        };
        const bhParticleCount = 180;
        const bhPositions = new Float32Array(bhParticleCount * 3);
        const bhColors    = new Float32Array(bhParticleCount * 3);

        const bhVertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }`;

        const bhFragmentShader = `
            varying vec2 vUv;
            uniform float uTime;
            void main() {
                vec2 uv = vUv - 0.5;
                float d = length(uv) * 2.0;
                float r = length(uv);

                // 事件视界（纯黑中心）
                float horizon = smoothstep(0.0, 0.09, d);

                // 光子环（亮环）
                float ring = exp(-pow((d - 0.12) * 28.0, 2.0)) * 0.9;
                float ring2 = exp(-pow((d - 0.18) * 18.0, 2.0)) * 0.35;

                // 螺旋吸积盘
                float angle = atan(uv.y, uv.x);
                float spiral = sin(angle * 4.0 + log(max(r, 0.001)) * 10.0 + uTime * 2.5) * 0.5 + 0.5;
                float discMask = (1.0 - smoothstep(0.09, 0.72, d)) * smoothstep(0.0, 0.08, d);
                float disc = spiral * discMask;

                // 颜色
                vec3 discColor = mix(vec3(1.0, 0.35, 0.06), vec3(0.7, 0.08, 0.02), d);
                vec3 ringColor = vec3(1.0, 0.85, 0.95);

                vec3 col = vec3(0.0);
                col += ringColor * (ring + ring2);
                col += discColor * disc * 0.55;
                col *= horizon; // 中心黑洞

                // 外发光
                float glow = exp(-d * 2.8) * 0.12;
                col += vec3(0.5, 0.15, 0.04) * glow * horizon;

                float alpha = clamp(max(max(col.r, col.g), max(col.b, (ring + ring2 + disc * 0.3 + glow) * 0.9)), 0.0, 1.0);
                gl_FragColor = vec4(col, alpha);
            }`;

        function createBlackHole(zLocal) {
            const size = 3.5;
            const geo = new THREE.PlaneGeometry(size, size);
            const mat = new THREE.ShaderMaterial({
                vertexShader: bhVertexShader,
                fragmentShader: bhFragmentShader,
                uniforms: { uTime: { value: 0 } },
                transparent: true,
                depthWrite: false,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(0, 0.3, zLocal);
            mesh.renderOrder = 0.5;
            plankGroup.add(mesh);
            blackHoleMesh = mesh;
            blackHoleData.targetZ = zLocal;

            // 环绕粒子
            for (let i = 0; i < bhParticleCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 0.15 + Math.random() * 1.6;
                const speed = 0.6 + Math.random() * 1.8;
                const height = (Math.random() - 0.5) * 0.3;
                blackHoleData.particles.push({
                    angle,
                    radius,
                    speed,
                    height,
                    baseRadius: radius,
                    life: 999,
                });
                bhPositions[i * 3] = 0;
                bhPositions[i * 3 + 1] = -999;
                bhPositions[i * 3 + 2] = 0;
                bhColors[i * 3] = 1; bhColors[i * 3 + 1] = 0.5; bhColors[i * 3 + 2] = 0.1;
            }
            const bhGeo = new THREE.BufferGeometry();
            bhGeo.setAttribute('position', new THREE.BufferAttribute(bhPositions, 3));
            bhGeo.setAttribute('color', new THREE.BufferAttribute(bhColors, 3));
            const bhPtsMat = new THREE.PointsMaterial({
                size: 0.06,
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
            });
            blackHoleData.pointMesh = new THREE.Points(bhGeo, bhPtsMat);
            blackHoleData.pointMesh.renderOrder = 1;
            plankGroup.add(blackHoleData.pointMesh);
        }

        function trySpawnBlackHole() {
            if (blackHoleSpawned || gameWon || gameOver) return;
            if (comboCount < levels[currentLevel].comboToWin) return;
            blackHoleSpawned = true;
            const z = nextSegZ - currentSegTotal * 2;
            targetDistance = Math.abs(z);
            tarDistEl.textContent = '目标 ' + targetDistance.toFixed(1) + ' m';
            createBlackHole(z);
        }

        // === 碎裂粒子系统 ===
        const explosionCount = 300;
        const explosionPositions = new Float32Array(explosionCount * 3);
        const explosionColors = new Float32Array(explosionCount * 3);
        const explosionVelocities = [];

        const explosionGeo = new THREE.BufferGeometry();
        explosionGeo.setAttribute('position', new THREE.BufferAttribute(explosionPositions, 3));
        explosionGeo.setAttribute('color', new THREE.BufferAttribute(explosionColors, 3));
        const explosionMat = new THREE.PointsMaterial({
            size: 0.08,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 1,
        });
        const explosionPoints = new THREE.Points(explosionGeo, explosionMat);
        explosionPoints.visible = false;
        scene.add(explosionPoints);

        function triggerDeath() {
            if (gameOver) return;
            gameOver = true;
            deathTime = 0;
            hideCombo();
            speedBoostEndTime = 0;
            resumeInvincibleUntil = 0;
            bstMat.opacity = 0;
            for (let i = 0; i < bstPartMax; i++) { bstData[i].life = 0; }
            document.getElementById('boost-indicator').style.opacity = '0';

            // 隐藏球体相关
            sphere.visible = false;
            wireframeSphere.visible = false;
            particleRing.visible = false;

            // 生成爆炸粒子
            const cx = sphere.position.x;
            const cy = sphere.position.y;
            const cz = sphere.position.z;
            for (let i = 0; i < explosionCount; i++) {
                explosionPositions[i * 3] = cx;
                explosionPositions[i * 3 + 1] = cy;
                explosionPositions[i * 3 + 2] = cz;
                const spread = 0.8 + Math.random() * 1.2;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;
                explosionVelocities.push({
                    x: Math.sin(phi) * Math.cos(theta) * spread,
                    y: Math.sin(phi) * Math.sin(theta) * spread + 0.5,
                    z: Math.cos(phi) * spread,
                });
                const c = currentBallColor.clone().lerp(
                    new THREE.Color(0xffffff), Math.random() * 0.6
                );
                explosionColors[i * 3] = c.r;
                explosionColors[i * 3 + 1] = c.g;
                explosionColors[i * 3 + 2] = c.b;
            }
            explosionGeo.attributes.position.needsUpdate = true;
            explosionGeo.attributes.color.needsUpdate = true;
            explosionPoints.visible = true;
        }

        function nextLevel() {
            unlockNextLevel();
            currentLevel++;
            velZ = levels[currentLevel].velZ;
            restartGame();
        }

        function restartGame() {
            // === 关键重置：必须首先执行 ===
            document.getElementById('gameover-overlay').style.display = 'none';
            document.getElementById('win-overlay').style.display = 'none';
            document.getElementById('levelselect-overlay').style.display = 'none';
            gameStarted = true;
            gameOver = false;
            gameWon = false;
            falling = false;
            fallTime = 0;
            deathTime = 0;
            // 轨道起点归零
            plankGroup.position.z = 0;
            nextSegZ = 0;
            // 球归位
            sphere.position.set(0, 0.3, 0);
            sphere.visible = true;
            wireframeSphere.position.set(0, 0.3, 0);
            wireframeSphere.visible = true;
            particleRing.position.set(0, 0.3, 0);
            particleRing.visible = true;
            pointLight.position.set(2, 1, 2);
            // 距离显示归零
            curDistEl.textContent = '0.0 m';
            targetDistance = null;
            tarDistEl.textContent = '目标 ??? m';
            // 爆炸粒子隐藏
            explosionPoints.visible = false;
            explosionVelocities.length = 0;
            for (let i = 0; i < explosionCount; i++) {
                explosionPositions[i * 3] = 0;
                explosionPositions[i * 3 + 1] = -999;
                explosionPositions[i * 3 + 2] = 0;
            }
            explosionGeo.attributes.position.needsUpdate = true;

            // === 以下为状态清理（出错不影响上述关键重置） ===
            safeColor = null;
            segmentsGenerated = 0;
            targetBallX = 0;
            comboCount = 0;
            hideCombo();
            beatGenIdx = 0;
            audioBeatIdx = 0;
            currentSegTotal = defaultSegTotal;
            velZ = levels[currentLevel].velZ;
            updateLevelDisplay();
            levelComplete = false;
            speedBoostEndTime = 0;
            resumeInvincibleUntil = 0;
            bstMat.opacity = 0;
            for (let i = 0; i < bstPartMax; i++) { bstData[i].life = 0; }
            document.getElementById('boost-indicator').style.opacity = '0';
            try {
                sphere.material.color.copy(origBallColor);
                currentBallColor.copy(origBallColor);
            } catch (e) {}
            // 清理黑洞
            try {
                if (blackHoleMesh) {
                    plankGroup.remove(blackHoleMesh);
                    blackHoleMesh.material.dispose();
                    blackHoleMesh.geometry.dispose();
                    blackHoleMesh = null;
                }
                if (blackHoleData.pointMesh) {
                    plankGroup.remove(blackHoleData.pointMesh);
                    blackHoleData.pointMesh.geometry.dispose();
                    blackHoleData.pointMesh.material.dispose();
                    blackHoleData.pointMesh = null;
                }
            } catch (e) {}
            blackHoleData.particles = [];
            blackHoleSpawned = false;
            // 清空涟漪
            try {
                for (const r of ripplePool) { r.life = 0; r.mesh.visible = false; }
                for (let i = 0; i < rippleParticleMax; i++) {
                    rpData[i].life = 0;
                    rpPositions[i * 3 + 1] = -999;
                    rpAlphas[i] = 0;
                }
                rpGeo.attributes.position.needsUpdate = true;
                rpGeo.attributes.aAlpha.needsUpdate = true;
            } catch (e) {}
            // 清空旧轨道：直接从 plankGroup 移除所有子物体（每个 dispose 独立 try-catch 防止中断）
            while (plankGroup.children.length > 0) {
                const child = plankGroup.children[0];
                plankGroup.remove(child);
                try { if (child.material) child.material.dispose(); } catch (e) {}
                try { if (child.geometry) child.geometry.dispose(); } catch (e) {}
            }
            plankPool.length = 0;
            blackHoleMesh = null;
            blackHoleData.pointMesh = null;
            blackHoleSpawned = false;
            blackHoleData.particles = [];
            ensureSegments();
        }

        function resumeGame() {
            gameOver = false;
            falling = false;
            fallTime = 0;
            safeColor = null;
            deathTime = 0;
            resumeInvincibleUntil = performance.now() + 2500; // 复活后2.5秒无敌
            sphere.visible = true;
            wireframeSphere.visible = true;
            particleRing.visible = true;
            sphere.position.set(targetBallX, 0.3, 0);
            wireframeSphere.position.set(targetBallX, 0.3, 0);
            particleRing.position.set(targetBallX, 0.3, 0);
            pointLight.position.set(targetBallX + 2, 1, 2);
            sphere.material.color.copy(currentBallColor);
            explosionPoints.visible = false;
            explosionVelocities.length = 0;
            document.getElementById('gameover-overlay').style.display = 'none';
        }

        let adTimer = null;
        function showAd() {
            const adOverlay = document.getElementById('ad-overlay');
            const adVideo = document.getElementById('ad-video');
            const adCountdownEl = document.getElementById('ad-countdown');
            adOverlay.style.display = 'flex';
            let remaining = 10;
            adCountdownEl.textContent = remaining;
            adVideo.currentTime = 0;
            adVideo.muted = false;
            adVideo.volume = 1.0;
            const playPromise = adVideo.play();
            if (playPromise) playPromise.catch(() => {});
            if (adTimer) clearInterval(adTimer);
            adTimer = setInterval(() => {
                remaining--;
                adCountdownEl.textContent = remaining;
                if (remaining <= 0) {
                    clearInterval(adTimer);
                    adTimer = null;
                    adVideo.pause();
                    adOverlay.style.display = 'none';
                    resumeGame();
                }
            }, 1000);
        }

        document.getElementById('restart-btn').addEventListener('click', restartGame);
        document.getElementById('resume-btn').addEventListener('click', showAd);
        document.getElementById('go-select-btn').addEventListener('click', () => {
            if (adTimer) { clearInterval(adTimer); adTimer = null; }
            document.getElementById('ad-overlay').style.display = 'none';
            showLevelSelect();
        });
        document.getElementById('win-select-btn').addEventListener('click', showLevelSelect);
        document.getElementById('win-restart-btn').addEventListener('click', () => {
            if (currentLevel < totalLevels - 1) {
                nextLevel();
            } else {
                currentLevel = 0;
                restartGame();
            }
        });

        // === 涟漪系统（ShaderMaterial 羽化环纹 + 软光粒子） ===
        // -- 环纹着色器 --
        const rippleRingVert = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }`;

        const rippleRingFrag = `
            varying vec2 vUv;
            uniform float uOpacity;
            uniform vec3 uColor;
            void main() {
                vec2 c = vUv - 0.5;
                float d = length(c) * 2.0;
                float inner = 0.16;
                float peak  = 0.28;
                float outer = 0.62;
                float alpha = smoothstep(inner, peak, d)
                            * (1.0 - smoothstep(peak, outer, d));
                float core = exp(-pow((d - peak) * 16.0, 2.0)) * 0.55;
                alpha = clamp(alpha + core, 0.0, 1.0);
                alpha *= uOpacity;
                alpha *= 1.0 - smoothstep(0.84, 1.06, d);
                gl_FragColor = vec4(uColor, alpha);
            }`;

        const ripplePool = [];
        const maxRipples = 10;

        function createRipple() {
            const geo = new THREE.PlaneGeometry(1.5, 1.5);
            const mat = new THREE.ShaderMaterial({
                vertexShader: rippleRingVert,
                fragmentShader: rippleRingFrag,
                uniforms: {
                    uOpacity: { value: 0 },
                    uColor: { value: new THREE.Color(0xffffff) },
                },
                transparent: true,
                depthWrite: false,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = -Math.PI / 2;
            mesh.visible = false;
            mesh.renderOrder = 1;
            scene.add(mesh);
            return { mesh, life: 0, maxLife: 0.85, startScale: 0.12, endScale: 7.6 };
        }

        // -- 粒子着色器（软光圆点） --
        const ripplePartVert = `
            attribute float aAlpha;
            varying float vAlpha;
            varying vec3 vColor;
            void main() {
                vec4 mv = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = 14.0;
                gl_Position = projectionMatrix * mv;
                vAlpha = aAlpha;
                vColor = color;
            }`;

        const ripplePartFrag = `
            varying float vAlpha;
            varying vec3 vColor;
            void main() {
                float d = length(gl_PointCoord - 0.5) * 2.0;
                float alpha = 1.0 - smoothstep(0.0, 1.0, d);
                alpha = pow(alpha, 2.2);
                alpha *= vAlpha;
                if (alpha < 0.005) discard;
                gl_FragColor = vec4(vColor, alpha);
            }`;

        const rippleParticleMax = 480;
        const rpPositions = new Float32Array(rippleParticleMax * 3);
        const rpColors    = new Float32Array(rippleParticleMax * 3);
        const rpAlphas    = new Float32Array(rippleParticleMax);
        const rpData = [];

        for (let i = 0; i < rippleParticleMax; i++) {
            rpPositions[i * 3] = 0;
            rpPositions[i * 3 + 1] = -999;
            rpPositions[i * 3 + 2] = 0;
            rpColors[i * 3] = 1; rpColors[i * 3 + 1] = 1; rpColors[i * 3 + 2] = 1;
            rpAlphas[i] = 0;
            rpData.push({ vx: 0, vy: 0, vz: 0, life: 0, maxLife: 0 });
        }

        const rpGeo = new THREE.BufferGeometry();
        rpGeo.setAttribute('position', new THREE.BufferAttribute(rpPositions, 3));
        rpGeo.setAttribute('color',    new THREE.BufferAttribute(rpColors, 3));
        rpGeo.setAttribute('aAlpha',   new THREE.BufferAttribute(rpAlphas, 1));
        const rpMat = new THREE.ShaderMaterial({
            vertexShader: ripplePartVert,
            fragmentShader: ripplePartFrag,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
        });
        const rpPoints = new THREE.Points(rpGeo, rpMat);
        rpPoints.renderOrder = 2;
        scene.add(rpPoints);

        let rpNextIdx = 0;

        // === 加速粒子翻涌系统 ===
        const bstPartMax = 1000;
        const bstPositions = new Float32Array(bstPartMax * 3);
        const bstColors    = new Float32Array(bstPartMax * 3);
        const bstData = []; // { vx, vy, vz, life, maxLife, hue }

        for (let i = 0; i < bstPartMax; i++) {
            bstPositions[i * 3] = (Math.random() - 0.5) * 18;
            bstPositions[i * 3 + 1] = -4 - Math.random() * 6;
            bstPositions[i * 3 + 2] = (Math.random() - 0.5) * 14;
            bstColors[i * 3] = 0; bstColors[i * 3 + 1] = 0; bstColors[i * 3 + 2] = 0;
            bstData.push({ vx: 0, vy: 0, vz: 0, life: 0, maxLife: 0, hue: 0 });
        }
        const bstGeo = new THREE.BufferGeometry();
        bstGeo.setAttribute('position', new THREE.BufferAttribute(bstPositions, 3));
        bstGeo.setAttribute('color',    new THREE.BufferAttribute(bstColors, 3));
        const bstMat = new THREE.PointsMaterial({
            size: 0.25,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0,
        });
        const bstPoints = new THREE.Points(bstGeo, bstMat);
        bstPoints.renderOrder = 0;
        scene.add(bstPoints);

        // === 碰撞碎片粒子系统 ===
        const debrisMax = 600;
        const debrisPositions = new Float32Array(debrisMax * 3);
        const debrisColors   = new Float32Array(debrisMax * 3);
        const debrisAlphas   = new Float32Array(debrisMax);
        const debrisData = [];

        for (let i = 0; i < debrisMax; i++) {
            debrisPositions[i * 3] = 0;
            debrisPositions[i * 3 + 1] = -999;
            debrisPositions[i * 3 + 2] = 0;
            debrisColors[i * 3] = 1; debrisColors[i * 3 + 1] = 1; debrisColors[i * 3 + 2] = 1;
            debrisAlphas[i] = 0;
            debrisData.push({ vx: 0, vy: 0, vz: 0, life: 0, maxLife: 0, size: 0 });
        }
        const debrisGeo = new THREE.BufferGeometry();
        debrisGeo.setAttribute('position', new THREE.BufferAttribute(debrisPositions, 3));
        debrisGeo.setAttribute('color',    new THREE.BufferAttribute(debrisColors, 3));
        const debrisMat = new THREE.PointsMaterial({
            size: 0.06,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 1,
        });
        const debrisPoints = new THREE.Points(debrisGeo, debrisMat);
        debrisPoints.renderOrder = 3;
        scene.add(debrisPoints);
        let debrisNextIdx = 0;

        function spawnDebris(x, y, z, plankColor) {
            const count = 25;
            const color = new THREE.Color(plankColor);
            for (let i = 0; i < count; i++) {
                const idx = debrisNextIdx;
                debrisNextIdx = (debrisNextIdx + 1) % debrisMax;
                const angle = Math.random() * Math.PI * 2;
                const spd = 1.5 + Math.random() * 4;
                const d = debrisData[idx];
                d.vx = Math.cos(angle) * spd * (0.4 + Math.random() * 0.6);
                d.vy = 1 + Math.random() * 3;
                d.vz = Math.sin(angle) * spd * (0.4 + Math.random() * 0.6);
                d.life = 0.001;
                d.maxLife = 0.5 + Math.random() * 0.7;
                d.size = 0.03 + Math.random() * 0.08;
                debrisPositions[idx * 3] = x + (Math.random() - 0.5) * 0.4;
                debrisPositions[idx * 3 + 1] = y + 0.02;
                debrisPositions[idx * 3 + 2] = z + (Math.random() - 0.5) * 0.3;
                const c = color.clone().lerp(new THREE.Color(0xffffff), Math.random() * 0.5);
                debrisColors[idx * 3] = c.r;
                debrisColors[idx * 3 + 1] = c.g;
                debrisColors[idx * 3 + 2] = c.b;
                debrisAlphas[idx] = 1;
            }
            debrisGeo.attributes.position.needsUpdate = true;
            debrisGeo.attributes.color.needsUpdate = true;
        }

        // === 加速拖影粒子系统 ===
        const trailMax = 200;
        const trailPositions = new Float32Array(trailMax * 3);
        const trailColors   = new Float32Array(trailMax * 3);
        const trailData = [];
        for (let i = 0; i < trailMax; i++) {
            trailPositions[i * 3] = 0;
            trailPositions[i * 3 + 1] = -999;
            trailPositions[i * 3 + 2] = 0;
            trailColors[i * 3] = 1; trailColors[i * 3 + 1] = 1; trailColors[i * 3 + 2] = 1;
            trailData.push({ life: 0, maxLife: 0 });
        }
        const trailGeo = new THREE.BufferGeometry();
        trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
        trailGeo.setAttribute('color',    new THREE.BufferAttribute(trailColors, 3));
        const trailMat = new THREE.PointsMaterial({
            size: 0.08,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.6,
        });
        const trailPoints = new THREE.Points(trailGeo, trailMat);
        trailPoints.renderOrder = 0;
        scene.add(trailPoints);
        let trailNextIdx = 0;
        let trailSpawnTimer = 0;

        function spawnTrailParticle(x, y, z, color) {
            const idx = trailNextIdx;
            trailNextIdx = (trailNextIdx + 1) % trailMax;
            const d = trailData[idx];
            d.life = 0.001;
            d.maxLife = 0.5 + Math.random() * 0.4;
            trailPositions[idx * 3] = x + (Math.random() - 0.5) * 0.2;
            trailPositions[idx * 3 + 1] = y + (Math.random() - 0.5) * 0.2;
            trailPositions[idx * 3 + 2] = z + (Math.random() - 0.5) * 0.15;
            trailColors[idx * 3] = color.r;
            trailColors[idx * 3 + 1] = color.g;
            trailColors[idx * 3 + 2] = color.b;
        }

        function spawnBstParticle(i, instant) {
            const d = bstData[i];
            d.vx = (Math.random() - 0.5) * 1.2;
            d.vy = 1.2 + Math.random() * 3.5;
            d.vz = (Math.random() - 0.5) * 0.8;
            d.maxLife = 1.5 + Math.random() * 2.8;
            d.life = instant ? Math.random() * d.maxLife : 0.001;
            d.hue = Math.random();
            bstPositions[i * 3]     = (Math.random() - 0.5) * 18;
            bstPositions[i * 3 + 1] = -4.5 - Math.random() * 5;
            bstPositions[i * 3 + 2] = (Math.random() - 0.5) * 14;
        }

        function spawnRippleParticles(x, y, z, color) {
            const count = 35;
            for (let i = 0; i < count; i++) {
                const idx = rpNextIdx;
                rpNextIdx = (rpNextIdx + 1) % rippleParticleMax;
                const angle = Math.random() * Math.PI * 2;
                const speed = 0.7 + Math.random() * 2.8;
                const d = rpData[idx];
                d.vx = Math.cos(angle) * speed;
                d.vy = 0.25 + Math.random() * 0.9;
                d.vz = Math.sin(angle) * speed;
                d.life = 0.001;
                d.maxLife = 0.4 + Math.random() * 0.5;
                rpPositions[idx * 3]     = x;
                rpPositions[idx * 3 + 1] = y;
                rpPositions[idx * 3 + 2] = z;
                rpColors[idx * 3]     = color.r;
                rpColors[idx * 3 + 1] = color.g;
                rpColors[idx * 3 + 2] = color.b;
                rpAlphas[idx] = 1;
            }
            rpGeo.attributes.position.needsUpdate = true;
            rpGeo.attributes.color.needsUpdate = true;
            rpGeo.attributes.aAlpha.needsUpdate = true;
        }

        function spawnRipple(x, y, z, color) {
            let ripple = ripplePool.find(r => r.life <= 0);
            if (!ripple && ripplePool.length < maxRipples) {
                ripple = createRipple();
                ripplePool.push(ripple);
            }
            if (!ripple) return;
            ripple.mesh.position.set(x, y - 0.03, z);
            ripple.mesh.scale.set(1, 1, 1);
            ripple.mesh.visible = true;
            ripple.mesh.material.uniforms.uColor.value.set(color.r, color.g, color.b);
            ripple.mesh.material.uniforms.uOpacity.value = 0.9;
            ripple.life = 0.001;
            spawnRippleParticles(x, y - 0.025, z, color);
        }

        // === 鼠标/触摸控制球左右移动 ===
        const mouseSensitivity = 6.5;  // 球最大位移，>5.5触发掉落虚空
        let targetBallX = 0;

        function updatePointer(clientX) {
            if (gameOver) return;
            const normalizedX = (clientX / window.innerWidth) * 2 - 1;
            targetBallX = normalizedX * mouseSensitivity;
        }

        window.addEventListener('mousemove', (e) => {
            updatePointer(e.clientX);
        });

        window.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) updatePointer(e.touches[0].clientX);
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length > 0) updatePointer(e.touches[0].clientX);
        }, { passive: false });

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.001;
            const boosting = performance.now() < speedBoostEndTime;
            const effectiveVelZ = boosting ? velZ * boostVelZFactor : velZ;

            // === 正常游戏状态 ===
            if (gameStarted && !gameOver && !falling && !gameWon) {
                // 轨道滚动
                plankGroup.position.z += effectiveVelZ * 0.016;
                recyclePlanks(5);
                ensureSegments();

                // 弹跳（使用动态节拍间距）
                let t = ((plankGroup.position.z - segLen / 2) / currentSegTotal) % 1;
                if (t < 0) t += 1;
                const bounce = bounceAmp * (1 - 8 * (t - 0.5) * (t - 0.5));

                // 球X轴平滑跟随鼠标
                sphere.position.x += (targetBallX - sphere.position.x) * 0.15;

                // 球体弹跳 + 自转
                sphere.rotation.y += 0.005;
                sphere.position.y = bounce;
                wireframeSphere.rotation.y += 0.003;
                wireframeSphere.rotation.x += 0.001;
                wireframeSphere.position.y = bounce;
                wireframeSphere.position.x = sphere.position.x;

                // 连击发光升级：高combo时球体更亮
                {
                    const comboGlow = Math.min(comboCount / 30, 1.0);
                    const targetEmissive = 0.2 + comboGlow * 1.0;
                    sphere.material.emissiveIntensity += (targetEmissive - sphere.material.emissiveIntensity) * 0.08;
                    wireframeMat.opacity = 0.15 + comboGlow * 0.45 + (performance.now() < resumeInvincibleUntil ? 0.4 : 0);
                }

                // 复活无敌闪烁效果
                if (performance.now() < resumeInvincibleUntil) {
                    const blink = 0.5 + 0.5 * Math.sin(performance.now() * 0.02);
                    wireframeMat.opacity = 0.15 + blink * 0.55;
                    sphere.material.emissiveIntensity = 0.3 + blink * 0.7;
                } else {
                    wireframeMat.opacity = 0.15;
                }

                // 加速拖影
                if (performance.now() < speedBoostEndTime) {
                    trailSpawnTimer += 0.016;
                    while (trailSpawnTimer > 0.03) {
                        trailSpawnTimer -= 0.03;
                        spawnTrailParticle(sphere.position.x, sphere.position.y, 0, currentBallColor);
                    }
                }

                // 粒子光环跟随
                particleRing.rotation.y += 0.002;
                particleRing.rotation.x = Math.sin(time * 0.3) * 0.1;
                particleRing.position.y = bounce;
                particleRing.position.x = sphere.position.x;

                // 点光源跟随
                pointLight.position.x = Math.sin(time) * 3 + sphere.position.x;
                pointLight.position.z = Math.cos(time) * 3;
                pointLight.position.y = 1 + bounce;

                // 统一碰撞检测：球落地接触任意木板 → 下陷 + 涟漪
                const contactThreshold = -bounceAmp * 0.65;
                for (const p of plankPool) {
                    const worldZ = p.position.z + plankGroup.position.z;
                    const xDist = Math.abs(sphere.position.x - p.position.x);
                    const halfW = p.userData.halfWidth;
                    if (Math.abs(worldZ) < segLen / 2 + 0.05 &&
                        xDist < halfW + 0.1 &&
                        bounce < contactThreshold &&
                        !p.userData._hitFrame) {
                        // 下陷缓冲
                        p.userData.sinkOffset = -0.06;
                        p.userData.sinkVelocity = 1.2;
                        p.userData._hitFrame = true;
                        // 涟漪
                        spawnRipple(sphere.position.x, plankTopY, 0, p.userData.plankColor);
                        // 碎片飞溅
                        spawnDebris(sphere.position.x, plankTopY, 0, p.userData.plankColor);
                        // 连击
                        triggerCombo();
                        // 节拍音效
                        playBeatAudio();
                        // 类型4：加速轨道
                        if (p.userData.type === 4) {
                            speedBoostEndTime = performance.now() + boostDuration;
                        }
                    }
                    // 离开接触范围时重置标记
                    if (bounce > -bounceAmp * 0.3) {
                        p.userData._hitFrame = false;
                    }
                }

                // 检测类型1 → 球变色
                for (const p of plankPool) {
                    if (p.userData.type === 1 &&
                        Math.abs(p.position.z + plankGroup.position.z) < 0.1 &&
                        Math.abs(sphere.position.x - p.position.x) < fullWidth / 2) {
                        sphere.material.color.copy(p.userData.plankColor);
                        currentBallColor.copy(p.userData.plankColor);
                        break;
                    }
                }

                // 检测类型2/3 → 球落到方块上且颜色不同则碎裂（无敌时间内跳过）
                if (plankGroup.position.z >= invincibleUntilZ && performance.now() >= resumeInvincibleUntil) {
                    for (const p of plankPool) {
                        const worldZ = p.position.z + plankGroup.position.z;
                        const xDist = Math.abs(sphere.position.x - p.position.x);
                        const halfW = p.userData.halfWidth;
                        if ((p.userData.type === 2 || p.userData.type === 3) &&
                            Math.abs(worldZ) < segLen / 2 + 0.05 &&
                            xDist < halfW + 0.1 &&
                            bounce < contactThreshold) {
                            if (!currentBallColor.equals(p.userData.plankColor)) {
                                triggerDeath();
                                break;
                            }
                        }
                    }
                }

                // 超出轨道边缘 → 掉落虚空（复活无敌时间内跳过）
                if (Math.abs(sphere.position.x) > trackEdge && performance.now() >= resumeInvincibleUntil) {
                    falling = true;
                    fallTime = 0;
                    wireframeSphere.visible = false;
                    particleRing.visible = false;
                }
            }

            // === 掉落虚空状态 ===
            if (gameStarted && falling && !gameOver && !gameWon) {
                fallTime += 0.016;
                const progress = Math.min(fallTime / fallDuration, 1);

                // 球继续X方向惯性移动
                sphere.position.x += (targetBallX - sphere.position.x) * 0.05;

                // 球加速下坠
                sphere.position.y -= (2 + progress * 6) * 0.016;
                sphere.rotation.y += 0.01;
                sphere.rotation.x += 0.005;

                pointLight.position.x = sphere.position.x;
                pointLight.position.y = sphere.position.y + 1;

                // 轨道继续滚动（保持视觉连贯）
                plankGroup.position.z += effectiveVelZ * 0.016;
                recyclePlanks(5);
                ensureSegments();

                // 1秒后弹出GameOver
                if (progress >= 1) {
                    gameOver = true;
                    hideCombo();
                    document.getElementById('gameover-overlay').style.display = 'flex';
                }
            }

            // === 碎裂死亡动画 ===
            if (gameOver && explosionPoints.visible) {
                deathTime += 0.016;
                const progress = Math.min(deathTime / deathDuration, 1);
                const gravity = 3;

                for (let i = 0; i < explosionCount; i++) {
                    const v = explosionVelocities[i];
                    explosionPositions[i * 3] += v.x * 0.016;
                    explosionPositions[i * 3 + 1] += v.y * 0.016;
                    explosionPositions[i * 3 + 2] += v.z * 0.016;
                    v.y -= gravity * 0.016;
                }
                explosionGeo.attributes.position.needsUpdate = true;
                explosionMat.opacity = 1 - progress;

                if (progress >= 1) {
                    document.getElementById('gameover-overlay').style.display = 'flex';
                }
            }

            // === 全局动画更新（所有状态） ===
            // 连击计时
            if (comboLife > 0 && !gameOver) {
                comboLife -= 0.016;
                if (comboLife <= 0) {
                    comboTextEl.style.opacity = '0';
                    comboCountEl.style.opacity = '0';
                    comboCount = 0;
                }
            }

            // 黑洞刷新
            trySpawnBlackHole();
            if (blackHoleSpawned && blackHoleMesh && !gameWon) {
                // 更新黑洞世界Z
                const bhWorldZ = blackHoleMesh.position.z + plankGroup.position.z;
                blackHoleData.targetZ = bhWorldZ;

                // 着色器时间
                blackHoleMesh.material.uniforms.uTime.value += 0.016;

                // 引力吸入（球距离黑洞越近拉力越强）
                const dx = blackHoleMesh.position.x - sphere.position.x;
                const dz = bhWorldZ - 0; // 球世界Z=0
                const distToBH = Math.sqrt(dx * dx + dz * dz);
                // 暗角：越靠近黑洞越暗
                const vigEl = document.getElementById('bh-vignette');
                if (distToBH < 6.0) {
                    const vigOpacity = Math.min(1, (1 - distToBH / 6.0) * 1.2);
                    vigEl.style.opacity = vigOpacity;
                } else {
                    vigEl.style.opacity = '0';
                }
                if (distToBH < 4.0 && distToBH > 0.08) {
                    const strength = 0.6 / (distToBH * distToBH + 0.1);
                    sphere.position.x += dx * strength * 0.016;
                    targetBallX = sphere.position.x; // 覆盖鼠标控制
                }

                // 胜利判定（球进入视界）
                if (distToBH < 0.25 && !gameOver && !falling && !gameWon) {
                    gameWon = true;
                    unlockNextLevel();
                    hideCombo();
                    sphere.visible = false;
                    wireframeSphere.visible = false;
                    particleRing.visible = false;
                    const isFinal = currentLevel >= totalLevels - 1;
                    document.getElementById('win-title').textContent = isFinal ? 'ALL CLEAR!' : 'YOU WIN!';
                    document.getElementById('win-msg').textContent = isFinal
                        ? '你征服了全部' + totalLevels + '个关卡！'
                        : '第' + (currentLevel + 1) + '关 · ' + levels[currentLevel].name + ' 通关！';
                    document.getElementById('win-restart-btn').textContent = isFinal ? '从头开始' : '下一关';
                    document.getElementById('win-overlay').style.display = 'flex';
                }

                // 环绕粒子更新
                const bhX = blackHoleMesh.position.x;
                const bhZ = blackHoleMesh.position.z;
                const bhWorldY = plankGroup.position.y + 0.3;
                for (let i = 0; i < bhParticleCount; i++) {
                    const p = blackHoleData.particles[i];
                    p.angle += p.speed * 0.016;
                    p.radius += (0.03 - p.radius * 0.02) * 0.016; // 缓慢向内螺旋
                    const px = bhX + Math.cos(p.angle) * p.radius;
                    const py = bhWorldY + p.height + Math.sin(p.angle * 3.0) * 0.08;
                    const pz = bhZ + Math.sin(p.angle) * p.radius * 0.3;
                    bhPositions[i * 3]     = px;
                    bhPositions[i * 3 + 1] = py;
                    bhPositions[i * 3 + 2] = pz;
                    // 离中心越近越亮
                    const br = 0.3 + (1.0 - p.radius / 1.8) * 0.7;
                    bhColors[i * 3]     = 1.0 * br;
                    bhColors[i * 3 + 1] = 0.35 * br;
                    bhColors[i * 3 + 2] = 0.06 * br;
                }
                blackHoleData.pointMesh.geometry.attributes.position.needsUpdate = true;
                blackHoleData.pointMesh.geometry.attributes.color.needsUpdate = true;
            } else {
                document.getElementById('bh-vignette').style.opacity = '0';
            }

            // 距离显示
            {
                const dist = plankGroup.position.z;
                curDistEl.textContent = dist.toFixed(1) + ' m';
                if (gameWon && targetDistance !== null) {
                    curDistEl.textContent = targetDistance.toFixed(1) + ' m';
                    tarDistEl.textContent = '目标 ' + targetDistance.toFixed(1) + ' m';
                }
            }
            // 加速指示器 + 粒子翻涌
            {
                const remaining = speedBoostEndTime - performance.now();
                const boostEl = document.getElementById('boost-indicator');
                const timerEl = document.getElementById('boost-timer');
                const active = remaining > 0;
                if (active) {
                    boostEl.style.opacity = '1';
                    timerEl.textContent = (remaining / 1000).toFixed(1) + 's';
                } else {
                    boostEl.style.opacity = '0';
                }
                // 粒子翻涌
                const targetOpacity = active ? 0.9 : 0;
                bstMat.opacity += (targetOpacity - bstMat.opacity) * 0.06;
                let bstDirty = false;
                for (let i = 0; i < bstPartMax; i++) {
                    const d = bstData[i];
                    if (d.life > 0) {
                        d.life += 0.016;
                        const tp = d.life / d.maxLife;
                        if (tp >= 1) {
                            if (active) { spawnBstParticle(i, false); }
                            else { d.life = 0; bstPositions[i * 3 + 1] = -999; }
                        } else {
                            const noise = Math.sin(d.life * 4.5 + i * 0.7) * 0.4;
                            d.vy += noise * 0.016;
                            d.vx += (Math.cos(d.life * 3.2 + i) * 0.3 - d.vx * 0.15) * 0.016;
                            bstPositions[i * 3]     += d.vx * 0.016;
                            bstPositions[i * 3 + 1] += d.vy * 0.016;
                            bstPositions[i * 3 + 2] += d.vz * 0.016;
                            const fade = tp < 0.2 ? tp / 0.2 : (1 - (tp - 0.2) / 0.8);
                            bstColors[i * 3]     = currentBallColor.r * fade;
                            bstColors[i * 3 + 1] = currentBallColor.g * fade;
                            bstColors[i * 3 + 2] = currentBallColor.b * fade;
                        }
                        bstDirty = true;
                    } else if (active) {
                        spawnBstParticle(i, false);
                        bstDirty = true;
                    }
                }
                if (bstDirty) {
                    bstGeo.attributes.position.needsUpdate = true;
                    bstGeo.attributes.color.needsUpdate = true;
                }
            }
            // 拖影更新
            let trDirty = false;
            for (let i = 0; i < trailMax; i++) {
                const d = trailData[i];
                if (d.life > 0) {
                    d.life += 0.016;
                    const t = Math.min(d.life / d.maxLife, 1);
                    if (t >= 1) {
                        d.life = 0;
                        trailPositions[i * 3 + 1] = -999;
                    } else {
                        trailPositions[i * 3 + 1] -= 1.5 * 0.016;
                        trailColors[i * 3]     *= 0.96;
                        trailColors[i * 3 + 1] *= 0.96;
                        trailColors[i * 3 + 2] *= 0.96;
                    }
                    trDirty = true;
                }
            }
            if (trDirty) {
                trailGeo.attributes.position.needsUpdate = true;
                trailGeo.attributes.color.needsUpdate = true;
            }

            // 木板下陷弹簧
            for (const p of plankPool) {
                let so = p.userData.sinkOffset || 0;
                let sv = p.userData.sinkVelocity || 0;
                if (so !== 0 || sv !== 0) {
                    const k = 50, d = 9;
                    sv += (-so * k - sv * d) * 0.016;
                    so += sv * 0.016;
                    if (Math.abs(so) < 0.0005 && Math.abs(sv) < 0.005) {
                        so = 0; sv = 0;
                    }
                    p.userData.sinkOffset = so;
                    p.userData.sinkVelocity = sv;
                    p.position.y = so;
                }
            }
            // 涟漪扩散
            for (const r of ripplePool) {
                if (r.life > 0) {
                    r.life += 0.016;
                    const t = Math.min(r.life / r.maxLife, 1);
                    if (t >= 1) {
                        r.mesh.visible = false;
                        r.life = 0;
                    } else {
                        const s = r.startScale + (r.endScale - r.startScale) * t;
                        r.mesh.scale.set(s, s, s);
                        r.mesh.material.uniforms.uOpacity.value = 0.9 * (1 - t);
                    }
                }
            }
            // 涟漪粒子更新
            let rpDirty = false;
            for (let i = 0; i < rippleParticleMax; i++) {
                const d = rpData[i];
                if (d.life > 0) {
                    d.life += 0.016;
                    const t = Math.min(d.life / d.maxLife, 1);
                    if (t >= 1) {
                        d.life = 0;
                        rpPositions[i * 3 + 1] = -999;
                        rpAlphas[i] = 0;
                    } else {
                        d.vy -= 2.8 * 0.016;
                        rpPositions[i * 3]     += d.vx * 0.016;
                        rpPositions[i * 3 + 1] += d.vy * 0.016;
                        rpPositions[i * 3 + 2] += d.vz * 0.016;
                        rpAlphas[i] = 1 - t;
                    }
                    rpDirty = true;
                }
            }
            if (rpDirty) {
                rpGeo.attributes.position.needsUpdate = true;
                rpGeo.attributes.aAlpha.needsUpdate = true;
            }
            // 碎片更新
            let dbDirty = false;
            for (let i = 0; i < debrisMax; i++) {
                const d = debrisData[i];
                if (d.life > 0) {
                    d.life += 0.016;
                    const t = Math.min(d.life / d.maxLife, 1);
                    if (t >= 1) {
                        d.life = 0;
                        debrisPositions[i * 3 + 1] = -999;
                    } else {
                        d.vy -= 5.5 * 0.016;
                        debrisPositions[i * 3]     += d.vx * 0.016;
                        debrisPositions[i * 3 + 1] += d.vy * 0.016;
                        debrisPositions[i * 3 + 2] += d.vz * 0.016;
                        const fade = 1 - t;
                        debrisColors[i * 3]     *= 0.98;
                        debrisColors[i * 3 + 1] *= 0.98;
                        debrisColors[i * 3 + 2] *= 0.98;
                    }
                    dbDirty = true;
                }
            }
            if (dbDirty) {
                debrisGeo.attributes.position.needsUpdate = true;
                debrisGeo.attributes.color.needsUpdate = true;
            }
            // 星空缓慢旋转（视差深度）
            starField.rotation.y += 0.0003;
            starField.rotation.x += 0.0001;

            controls.update();
            renderer.render(scene, camera);
        }

        // 窗口自适应
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
